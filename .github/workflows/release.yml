name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: get version
        run: echo "PACKAGE_VERSION=$(node -pe "require('./package.json').version")" >> $GITHUB_ENV
      - name: create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${process.env.PACKAGE_VERSION}`,
              name: `JNApp v${process.env.PACKAGE_VERSION}`,
              body: 'Nueva versión de JNApp. Descarga el instalador de abajo.',
              draft: true,
              prerelease: false
            })
            return data.id

  build-tauri:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable

      - name: install npm deps
        run: npm install

      # Multiline secrets often do not survive into npm/tauri on windows-latest when set only as TAURI_SIGNING_PRIVATE_KEY.
      # Write UTF-8 file + use TAURI_SIGNING_PRIVATE_KEY_PATH so the CLI reads the key reliably.
      - name: stage minisign key for Tauri
        id: signing
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            Write-Host '::error::TAURI_SIGNING_PRIVATE_KEY secret empty. Paste full minisign secret key (must pair with pubkey in tauri.conf.json). Not base64 wrapper unless you decode yourself.'
            exit 1
          }
          $path = Join-Path $env:RUNNER_TEMP 'tauri-signing.key'
          [System.IO.File]::WriteAllText($path, $env:TAURI_SIGNING_PRIVATE_KEY, [System.Text.UTF8Encoding]::new($false))
          Add-Content -Path $env:GITHUB_OUTPUT -Value "key_path=$path" -Encoding utf8NoBOM

      - name: build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ steps.signing.outputs.key_path }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_INSFORGE_URL: ${{ secrets.VITE_INSFORGE_URL }}
          VITE_INSFORGE_ANON_KEY: ${{ secrets.VITE_INSFORGE_ANON_KEY }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

  publish-release:
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri]
    steps:
      - name: publish release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            })
